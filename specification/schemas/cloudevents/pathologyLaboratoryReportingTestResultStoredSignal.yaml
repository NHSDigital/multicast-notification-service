"$schema": http://json-schema.org/draft-07/schema#
description: The Pathology Laboratory Reporting Test Result Stored event. You will receive this object if you subscribe to `pathology-laboratory-reporting-test-result-stored-1` events with an `application/json` format.
type: object
properties:
  id:
    description: Identifies the event.
    "$ref": "#/definitions/iddef"
    examples:
    - 236a1d4a-5d69-4fa9-9c7f-e72bf505aa5b
  source:
    description: Identifies the producer of the event.
    "$ref": "#/definitions/sourcedef"
    examples:
    - uk.nhs.pathology-laboratory-reporting
  specversion:
    description: The version of the CloudEvents specification which the event uses.  
    "$ref": "#/definitions/specversiondef"
    examples:
    - '1.0'
  type:
    description: Describes the occurrence; the name of the event.
    "$ref": "#/definitions/typedef"
    examples:
    - pathology-laboratory-reporting-test-result-stored-1
  subject:
    description: The NHS Number of the patient for whom the Test Result is available. This may be omitted if no NHS number is present in the test result.
    "$ref": "#/definitions/subjectdef"
    examples:
    - 9912003888
  time:
    description: Timestamp of when the occurrence happened. Must adhere to RFC 3339.
    "$ref": "#/definitions/timedef"
    examples:
    - '2020-06-01T13:00:00Z'
  dataref:
    description: A link to the Test Result Document Bundle on the Patient Data Manager API.
    "$ref": "#/definitions/datarefdef"
    examples:
    - https://api.service.nhs.uk/patient-data-manager/FHIR/R4/Bundle/b0b97bff-e3d7-4744-a09a-e55781886dd0
required:
- id
- source
- specversion
- type
- time
definitions:
  iddef:
    type: string
    minLength: 1
  sourcedef:
    type: string
    format: uri-reference
    minLength: 1
  specversiondef:
    type: string
    minLength: 1
  typedef:
    type: string
    minLength: 1
  subjectdef:
    type:
    - string
    minLength: 1
  timedef:
    type:
    - string
    format: date-time
    minLength: 1
  datarefdef:
    type: string
    format: uri
    minLength: 1
example:
  specversion: '1.0'
  id: 236a1d4a-5d69-4fa9-9c7f-e72bf505aa5b
  source: uk.nhs.pathology-laboratory-reporting
  type: pathology-laboratory-reporting-test-result-stored-1
  time: '2020-06-01T13:00:00Z'
  dataref: https://api.service.nhs.uk/patient-data-manager/FHIR/R4/Bundle/b0b97bff-e3d7-4744-a09a-e55781886dd0
  subject: '9912003888'
