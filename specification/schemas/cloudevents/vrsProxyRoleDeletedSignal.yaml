"$schema": http://json-schema.org/draft-07/schema#
description: The VRS Proxy Role Deleted event. You will receive this object if you subscribe to `vrs-proxy-role-deleted-1` events with an `application/cloudevents+json` format.
type: object
properties:
  id:
    description: Identifies the event.
    "$ref": "#/definitions/iddef"
    examples:
    - 898cc706-9156-4d67-941a-b37ca9a85861
  source:
    description: Identifies the producer of the event.
    "$ref": "#/definitions/sourcedef"
    examples:
    - uk.nhs.validated-relationships-service
  specversion:
    description: The version of the CloudEvents specification which the event uses.
    "$ref": "#/definitions/specversiondef"
    examples:
    - '1.0'
  type:
    description: Describes the occurrence; the name of the event.
    "$ref": "#/definitions/typedef"
    examples:
    - vrs-proxy-role-deleted-1
  subject:
    description: The NHS Number of the patient for which has the proxy role has been deleted.
    "$ref": "#/definitions/subjectdef"
    examples:
    - 9912003888
  time:
    description: Timestamp of when the occurrence happened. Must adhere to RFC 3339.
    "$ref": "#/definitions/timedef"
    examples:
    - '2026-02-27T11:47:12.157887+00:00'
  dataref:
    description: A link to the consent resource on the Validated Relationships Service API.
    "$ref": "#/definitions/datarefdef"
    examples:
    - https://api.service.nhs.uk/validated-relationships/FHIR/R4/Consent/ecc32c41
required:
- id
- source
- specversion
- type
- time
- subject
definitions:
  iddef:
    type: string
    minLength: 1
  sourcedef:
    type: string
    minLength: 1
  specversiondef:
    type: string
    minLength: 1
  typedef:
    type: string
    minLength: 1
  subjectdef:
    type:
    - string
    minLength: 1
  timedef:
    type:
    - string
    format: date-time
    minLength: 1
  datarefdef:
    type: string
    format: uri
    minLength: 1
example:
  specversion: '1.0'
  id: 898cc706-9156-4d67-941a-b37ca9a85861
  source: uk.nhs.validated-relationships-service
  type: vrs-proxy-role-deleted-1
  time: '2026-02-27T11:47:12.157887+00:00'
  dataref: https://api.service.nhs.uk/validated-relationships/FHIR/R4/Consent/ecc32c41
  subject: '9912003888'
